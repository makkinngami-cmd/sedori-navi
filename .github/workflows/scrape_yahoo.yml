name: Weekly Yahoo Auctions Scraper

on:
  schedule:
    # [TEST] 30分ごとに実行（today マーカーで重複スキップ）
    - cron: '*/30 * * * *'
  workflow_dispatch:         # 手動実行ボタン

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. チェックアウト ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1.5. 今日実行済みならスキップ ─────────────────────────────
      - name: Check if already scraped today
        id: skip_check
        run: |
          TODAY=$(python -c "from datetime import datetime, timezone, timedelta; print(datetime.now(timezone(timedelta(hours=9))).strftime('%Y-%m-%d'))")
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          if [ -f data/last_yahoo_scrape.txt ] && [ "$(cat data/last_yahoo_scrape.txt)" = "$TODAY" ]; then
            echo "Already scraped Yahoo today — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Yahoo not yet scraped today — proceeding"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ── 2. Python セットアップ ────────────────────────────────────
      - name: Set up Python
        if: steps.skip_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      # ── 3. 依存関係インストール ────────────────────────────────────
      - name: Install Python dependencies
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # ── 4. Playwright ブラウザインストール ────────────────────────
      - name: Install Playwright Chromium
        if: steps.skip_check.outputs.skip != 'true'
        run: playwright install chromium --with-deps

      # ── 5. スクレイパー実行 ────────────────────────────────────────
      - name: Run Yahoo scraper
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          cd scraper
          python scrape_yahoo.py
        env:
          PYTHONUNBUFFERED: "1"

      # ── 6. マーカーファイル書き込み ────────────────────────────────
      - name: Write today marker
        if: steps.skip_check.outputs.skip != 'true'
        run: echo "${{ steps.skip_check.outputs.today }}" > data/last_yahoo_scrape.txt

      # ── 7. 取得件数チェック ─────────────────────────────────────────
      - name: Verify scraped records
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          TODAY=${{ steps.skip_check.outputs.today }}
          COUNT=$(python -c "
          import csv
          with open('data/prices.csv', encoding='utf-8') as f:
              rows = [r for r in csv.DictReader(f) if r.get('date') == '$TODAY' and 'ヤフオク' in r.get('store','')]
          print(len(rows))
          ")
          echo "Today's Yahoo records: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "WARNING: No Yahoo records scraped for $TODAY"
          fi

      # ── 8. prices.csv / マーカー を docs/ にコピー ─────────────────
      - name: Copy CSV to docs/
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          cp data/prices.csv docs/prices.csv
          cp data/last_yahoo_scrape.txt docs/last_yahoo_scrape.txt

      # ── 9. コミット & プッシュ ────────────────────────────────────
      - name: Commit and push
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.csv docs/prices.csv data/last_yahoo_scrape.txt docs/last_yahoo_scrape.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Yahoo auction prices $(date +'%Y-%m-%d') [skip ci]"
            git push
          fi
