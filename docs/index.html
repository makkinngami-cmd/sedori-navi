<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- GitHub Pages publish marker: 2026-05-26T21:00 -->
  <title>せどりナビ</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <!-- Quagga2: iOS の1Dバーコードスキャンに使用 -->
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.4.2/dist/quagga.min.js"></script>
  <style>
    /* ── リセット & 変数 ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3248;
      --accent: #5c73f2;
      --accent2: #f25c73;
      --text: #e4e6f0;
      --text-muted: #7a7f99;
      --green: #4caf87;
      --yellow: #f2c94c;
      --radius: 10px;
      --font: 'Segoe UI', 'Noto Sans JP', sans-serif;
    }
    html { font-size: 14px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ── ヘッダー ─────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #1a1d27 0%, #22263a 100%);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
      flex-shrink: 0;
    }
    header h1 small {
      font-size: 0.6rem;
      font-weight: 400;
      margin-left: 0.4rem;
      vertical-align: middle;
      /* h1 の gradient text-fill を上書きして可視化 */
      -webkit-text-fill-color: var(--text-muted);
      background: none;
      opacity: 0.85;
    }
    #last-updated { display: none; }
    #status-badge  { display: none; }

    /* ── レイアウト ─────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 57px);
    }

    /* ── サイドバー ─────────────────────────────────── */
    #sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* カテゴリタブ */
    #category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .cat-tab {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .cat-tab:hover { border-color: var(--accent); color: var(--text); }
    .cat-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* 期間切り替えタブ */
    #period-tabs {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    .period-tab {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .period-tab:hover { border-color: var(--accent); color: var(--text); }
    .period-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* サブカテゴリタブ */
    #subcat-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
    }
    #subcat-tabs:empty { display: none; }
    .subcat-tab {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .subcat-tab:hover { border-color: var(--accent); color: var(--text); }
    .subcat-tab.active {
      background: rgba(92,115,242,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* 検索 */
    /* ── フィルタ／ソートバー ────────────────────────────── */
    #fav-filter-bar {
      display: flex;
      gap: 0.4rem;
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    #fav-filter-btn {
      flex: 1;
      min-width: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.32rem 0.55rem;
      transition: all 0.15s;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #fav-filter-btn:hover { border-color: var(--yellow); color: var(--text); }
    #fav-filter-btn.active {
      background: rgba(242,201,76,0.12);
      border-color: var(--yellow);
      color: var(--yellow);
    }
    #sort-rate-btn {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.32rem 0.55rem;
      transition: all 0.15s;
      white-space: nowrap;
    }
    #sort-rate-btn:hover { border-color: var(--accent); color: var(--text); }
    #sort-rate-btn.active {
      background: rgba(92,115,242,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    #search-wrap {
      flex: 1;
      display: flex;
      gap: 0.35rem;
      align-items: center;
    }
    #search {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      padding: 0.45rem 0.75rem;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text-muted); }
    #sidebar-barcode-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.95rem;
      line-height: 1;
      padding: 0.38rem 0.45rem;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    #sidebar-barcode-btn:hover { border-color: var(--accent); color: var(--text); }
    #sidebar-barcode-btn.scanning { border-color: var(--green); color: var(--green); }
    #alert-nav {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      flex-shrink: 0;
      font-size: 0.78rem;
      padding: 0.42rem 0.7rem;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    #alert-nav:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    /* ── バーコードスキャナ モーダル ────────────────────── */
    #barcode-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #barcode-modal.hidden { display: none; }
    .barcode-modal-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      width: min(360px, 92vw);
    }
    .barcode-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      font-weight: 600;
    }
    #barcode-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0.1rem 0.3rem;
    }
    #barcode-close:hover { color: var(--text); }
    #barcode-reader {
      width: 100%;
    }
    #barcode-reader video { border-radius: 0 !important; }
    #barcode-status {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
      padding: 0.55rem 1rem;
      border-top: 1px solid var(--border);
      min-height: 2.2rem;
    }
    #barcode-status.success { color: var(--green); font-weight: 600; }
    /* 検索結果パネル（サイドバー内インライン） */
    #search-results {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #search-results.hidden { display: none; }

    /* 商品リスト */
    #product-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .product-item {
      align-items: center;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      padding: 0.65rem 0.9rem;
      transition: background 0.1s;
    }
    .product-item:hover { background: var(--surface2); }
    .product-item.selected { background: rgba(92, 115, 242, 0.15); border-left: 3px solid var(--accent); }
    .product-item .prod-name-wrap {
      display: flex;
      flex-direction: column;
      gap: 1px;
      overflow: hidden;
      max-width: 210px;
    }
    .product-item .prod-name {
      font-size: 0.82rem;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .product-item .prod-jan {
      font-size: 0.62rem;
      color: var(--text-muted);
      letter-spacing: 0.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0.7;
    }
    .product-item .prod-prices {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }
    .price-pill {
      background: var(--surface2);
      border-radius: 4px;
      font-size: 0.7rem;
      padding: 1px 5px;
      white-space: nowrap;
    }
    .price-pill.store-a { border-left: 2px solid var(--accent); }
    .price-pill.store-b { border-left: 2px solid var(--accent2); }
    .price-pill.store-c { border-left: 2px solid var(--green); }
    .no-data { color: var(--text-muted); font-size: 0.75rem; font-style: italic; }
    .rate-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .rate-badge.high   { background: rgba(76,175,135,0.18); color: var(--green); }
    .rate-badge.mid    { background: rgba(242,201,76,0.18); color: var(--yellow); }
    .rate-badge.low    { background: rgba(242,92,115,0.18); color: var(--accent2); }
    .rate-badge.nodata { background: transparent; color: var(--text-muted); }

    /* ── メインエリア ─────────────────────────────────── */
    #main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1.25rem 1.5rem;
      gap: 1rem;
    }

    /* スタッツカード（4枚横並び） */
    #stat-cards {
      display: none;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex: 1;
      min-width: 130px;
      padding: 0.8rem 1rem;
    }
    .stat-card .sc-label {
      color: var(--text-muted);
      font-size: 0.72rem;
      margin-bottom: 0.2rem;
    }
    .stat-card .sc-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-card .sc-sub {
      color: var(--text-muted);
      font-size: 0.7rem;
      margin-top: 0.2rem;
    }
    .stat-card.green .sc-value { color: var(--green); }
    .stat-card.red   .sc-value { color: var(--accent2); }
    .stat-card.yellow .sc-value { color: var(--yellow); }

    /* ヘッダーサブタイトル */
    h1 small {
      display: block;
      font-size: 0.65rem;
      font-weight: 400;
      opacity: 0.75;
      letter-spacing: 0.03em;
    }

    /* 商品タイトル */
    #product-title {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    #product-title span {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      color: var(--text-muted);
      vertical-align: middle;
    }
    #pt-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.2rem 0.6rem;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }
    #pt-link:hover { background: rgba(92,115,242,0.15); border-color: var(--accent); }
    #pt-link.hidden { display: none; }

    /* チャート */
    #chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex: 1;
      min-height: 0;
      padding: 1rem;
      position: relative;
    }
    #myChart { width: 100% !important; height: 100% !important; }
    #chart-store-filter {
      display: none;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin: 0 0 0.75rem;
    }
    .plot-toggle {
      align-items: center;
      background: rgba(34,38,58,0.82);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      font-size: 0.72rem;
      gap: 0.35rem;
      line-height: 1;
      min-height: 26px;
      padding: 0.35rem 0.55rem;
      user-select: none;
    }
    .plot-toggle:hover { border-color: var(--accent); }
    .plot-toggle input {
      accent-color: var(--accent);
      height: 13px;
      width: 13px;
    }
    .plot-toggle .swatch {
      border-radius: 50%;
      display: inline-block;
      height: 9px;
      width: 9px;
    }
    .plot-toggle .swatch.line {
      background: transparent !important;
      border-radius: 0;
      height: 0;
      width: 22px;
    }
    .plot-toggle.off {
      color: var(--text-muted);
      opacity: 0.65;
    }
    .plot-toggle.off .swatch { opacity: 0.45; }

    /* プレースホルダー */
    #placeholder {
      align-items: center;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      height: 100%;
      justify-content: center;
    }
    #placeholder .icon { font-size: 3rem; opacity: 0.3; }

    /* テーブル */
    #data-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-height: 180px;
      overflow-y: auto;
    }
    table {
      border-collapse: collapse;
      font-size: 0.8rem;
      width: 100%;
    }
    thead th {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.5rem 0.75rem;
      text-align: left;
      position: sticky;
      top: 0;
    }
    tbody td {
      border-bottom: 1px solid var(--border);
      padding: 0.4rem 0.75rem;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--surface2); }

    /* ── ヘッダー検索 ───────────────────────────────────── */
    .sri {
      align-items: center;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      gap: 0.5rem;
      justify-content: space-between;
      padding: 0.5rem 0.9rem;
      transition: background 0.1s;
    }
    .sri:last-child { border-bottom: none; }
    .sri:hover { background: var(--surface2); }
    .sri-left { overflow: hidden; }
    .sri-name { font-size: 0.83rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sri-jan  { color: var(--text-muted); font-size: 0.7rem; letter-spacing: 0.04em; margin-top: 1px; }
    .sri-price { color: var(--accent); flex-shrink: 0; font-size: 0.78rem; font-weight: 600; }
    .sri-price.no-data { color: var(--text-muted); font-weight: 400; }
    .sri-empty { color: var(--text-muted); font-size: 0.82rem; padding: 0.75rem; text-align: center; }

    /* ── ローディング ─────────────────────────────────── */
    #loading {
      align-items: center;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      height: 100%;
      justify-content: center;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 999;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── お気に入りボタン ────────────────────────────────── */
    .fav-btn {
      align-items: center;
      background: rgba(242,201,76,0.08);
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--yellow);
      cursor: pointer;
      display: inline-flex;
      font-size: 1.15rem;
      height: 26px;
      justify-content: center;
      line-height: 1;
      opacity: 0.2;
      padding: 0;
      flex-shrink: 0;
      align-self: flex-start;
      transition: opacity 0.15s, transform 0.12s, border-color 0.15s, background 0.15s;
      width: 26px;
    }
    .fav-btn:hover { border-color: rgba(242,201,76,0.45); opacity: 0.8; transform: scale(1.08); }
    .fav-btn.active { background: rgba(242,201,76,0.16); border-color: rgba(242,201,76,0.45); opacity: 1; }

    /* ── レスポンシブ ─────────────────────────────────── */
    @media (max-width: 720px) {
      .app { grid-template-columns: 1fr; height: auto; }
      header { padding: 0.6rem 0.75rem; gap: 0.5rem; }
      #alert-nav { font-size: 0.72rem; padding: 0.38rem 0.55rem; }
      #sidebar { height: 50vh; }
      #main { height: auto; overflow-y: auto; padding: 1rem; }
      #chart-wrap { flex: none; height: 440px; max-height: 440px; min-height: 0; overflow: hidden; }
      #chart-store-filter { gap: 0.35rem; margin-bottom: 0.6rem; }
      .plot-toggle { font-size: 0.68rem; min-height: 24px; padding: 0.3rem 0.45rem; }
      #myChart { display: block; height: 300px !important; max-height: 300px !important; }
      #stat-cards { flex-wrap: nowrap; gap: 0.4rem; }
      #stat-cards .stat-card { min-width: 0; padding: 0.5rem 0.6rem; }
      #stat-cards .stat-card .sc-value { font-size: 1rem; }
      #stat-cards .stat-card .sc-label { font-size: 0.65rem; }
      #stat-cards .stat-card .sc-sub   { font-size: 0.62rem; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>データを読み込んでいます…</div>
</div>

<header>
  <h1>📊 せどりナビ<small> ポイントせどり支援ツール</small></h1>
  <div id="search-wrap">
    <input id="search" type="search" placeholder="商品名・JANコードで検索…" autocomplete="off" spellcheck="false">
    <button id="sidebar-barcode-btn" title="バーコードで検索">📷</button>
  </div>
  <span id="status-badge">読込中</span>
  <span id="last-updated"></span>
  <a id="alert-nav" href="./alerts.html">価格アラーム</a>
</header>

<div class="app">
  <!-- ── サイドバー ──────────────────────────────── -->
  <aside id="sidebar">
    <div id="category-tabs">
      <button class="cat-tab active" data-cat="all">すべて</button>
      <button class="cat-tab" data-cat="ゲーム">🎮 ゲーム</button>
      <button class="cat-tab" data-cat="カメラ">📷 カメラ</button>
      <button class="cat-tab" data-cat="ポケカ">🃏 ポケカ</button>
      <button class="cat-tab" data-cat="ワンピ">🃏 ワンピ</button>
      <button class="cat-tab" data-cat="スマートフォン">📱 スマートフォン</button>
      <button class="cat-tab" data-cat="その他">📦 その他</button>
    </div>
    <div id="subcat-tabs"></div>
    <div id="fav-filter-bar">
      <button id="fav-filter-btn">☆ お気に入り</button>
      <button id="sort-rate-btn">買取率 ▼</button>
    </div>

function matchSubcat(productName, subcat) {
  if (!subcat || subcat.id === 'all' || subcat.prefixes === null) return true;
  if (!subcat.prefixes.length) return false;
  if (subcat.match === 'contains') {
    return subcat.prefixes.some(p => productName.includes(p));
  }
  return subcat.prefixes.some(p => productName.startsWith(p));
}

function renderPlotFilters(datasets) {
  const filter = document.getElementById('chart-store-filter');
  if (!filter) return;
  const labels = datasets
    .map(ds => ds.label)
    .filter(label => !HIDDEN_LEGEND_STORES.has(label));
  filter.innerHTML = '';
  if (!labels.length) {
    filter.style.display = 'none';
    return;
  }
  labels.forEach(label => {
    const color = STORE_COLORS[label] || { border: '#aaa' };
    const toggle = document.createElement('label');
    toggle.className = 'plot-toggle' + (shouldHidePlot(label) ? ' off' : '');

    const input = document.createElement('input');
    input.type = 'checkbox';
    input.checked = !shouldHidePlot(label);
    input.addEventListener('change', () => {
      if (input.checked) hiddenPlots.delete(label);
      else hiddenPlots.add(label);
      saveHiddenPlots();
      applyPlotVisibility(myChart.data.datasets);
      myChart.update();
      renderPlotFilters(myChart.data.datasets);

    const swatch = document.createElement('span');
    swatch.className = label === '定価' ? 'swatch line' : 'swatch';
    if (swatch.classList.contains('line')) {
      swatch.style.borderTop = `2px ${label === '定価' ? 'dashed' : 'dotted'} ${color.border}`;
    } else {
      swatch.style.background = color.border;
    }

    const text = document.createElement('span');
    text.textContent = label;

    toggle.appendChild(input);
    toggle.appendChild(swatch);
    toggle.appendChild(text);
    filter.appendChild(toggle);
  });
  filter.style.display = 'flex';
}

// 同一商品に複数行持つことで値上げ・値下げの履歴を表現する
let msrpHistory = {};
// priceTypeMap: { product_name: 'market'|'' }

// ─────────────────────────────────────────────────────────────────────
// 定価ヘルパー（日付ベース）
// ─────────────────────────────────────────────────────────────────────
// 指定日付時点の有効な定価を返す（effective_date <= date の中で最新のもの）
function getMsrpForDate(name, date) {
  const history = msrpHistory[name];
  if (!history || !history.length) return null;
  let best = null;
  for (const entry of history) {
    if (entry.effective_date <= date) {
      if (!best || entry.effective_date > best.effective_date) best = entry;
    }
  }
  return best ? best.msrp : null;
}
// 今日時点の最新定価
function getMsrpLatest(name) {
  const today = new Date().toISOString().split('T')[0];
  return getMsrpForDate(name, today);
}

// 買取率の色クラス
function rateClass(pct) {
  if (pct === null) return 'nodata';
  if (pct >= 75) return 'high';
  if (pct >= 50) return 'mid';
  return 'low';
}
function calcRate(buyback, msrp) {
  if (!msrp || !buyback) return null;
  return Math.round((buyback / msrp) * 1000) / 10;  // 小数1桁
}

// ─────────────────────────────────────────────────────────────────────
// CSV パーサー
// ─────────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
    obj.price = parseInt(obj.price, 10) || 0;
    // JAN・URL マップを更新（買取一丁目の行のみ。ヤフオクURLで上書きしない）
    if (obj.jan && obj.product_name) janMap[obj.product_name] = obj.jan;
    if (obj.url && obj.product_name && obj.store === '買取一丁目') urlMap[obj.product_name] = obj.url;
    return obj;
  }).filter(r => r.date && r.product_name && r.store && r.price > 0);
}

// ─────────────────────────────────────────────────────────────────────
// データ集計ユーティリティ
// ─────────────────────────────────────────────────────────────────────
function getProductLatestPrices(productName) {
  // 商品名の全行 → 店舗ごとに最新日付の価格を返す
  const rows = allRows.filter(r => r.product_name === productName);
  const result = {};
  STORE_NAMES.forEach(s => {
    const storeRows = rows.filter(r => r.store === s).sort((a, b) => b.date.localeCompare(a.date));
    if (storeRows.length) result[s] = storeRows[0];
  });
  return result;
}

function getUniqueDates(productName) {
  return [...new Set(allRows.filter(r => r.product_name === productName).map(r => r.date))].sort();
}

// 商品の初回データ日〜全体最新日までの連続日付配列を生成
function buildChartDates(productName) {
  const productDates = getUniqueDates(productName);
  if (!productDates.length) return [];
  const globalLatest = allRows.reduce((max, r) => r.date > max ? r.date : max, '');
  let start = new Date(productDates[0]);
  const end   = new Date(globalLatest);
  // 期間フィルタ: currentPeriod 日数ぶんだけ遡る（0 = 全期間）
  if (currentPeriod > 0) {
    const cutoff = new Date(end);
    cutoff.setDate(cutoff.getDate() - (currentPeriod - 1));
    if (cutoff > start) start = cutoff;
  }
  const dates = [];
  for (const d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    dates.push(d.toISOString().split('T')[0]);
  }
  return dates;
}

function getProductsInCategory(cat) {
  // CSV に登録された商品の中からカテゴリでフィルタ
  const names = [...new Set(allRows.map(r => r.product_name))];
  if (cat === 'all') return names.sort();
  return names.filter(n => (PRODUCT_CATEGORIES[n] || 'その他') === cat).sort();
}

function updateSummaryCards() {

// ─────────────────────────────────────────────────────────────────────
// 商品別スタッツカード更新
// ─────────────────────────────────────────────────────────────────────
function updateProductCards(productName) {
  const statCards = document.getElementById('stat-cards');

  if (!productName) { statCards.style.display = 'none'; return; }

  const rows = allRows.filter(r => r.product_name === productName);
  if (!rows.length) { statCards.style.display = 'none'; return; }

  // すべての指標は買取一丁目のデータで計算する
  const ichomeRows = rows.filter(r => r.store === '買取一丁目');
  const statRows   = ichomeRows.length ? ichomeRows : rows;
  const statDates  = [...new Set(statRows.map(r => r.date))].sort();
  const latestDate = statDates[statDates.length - 1];
  const latestRow  = statRows.filter(r => r.date === latestDate)[0];
  const currentPrice = latestRow ? latestRow.price : NaN;

  // ── 現在買取額 + 前日比 ──────────────────────────────
  const priceEl   = document.getElementById('sc-price');
  const priceSubEl = document.getElementById('sc-price-sub');
  const priceWrap  = document.getElementById('sc-price-wrap');
  priceEl.textContent = isFinite(currentPrice) ? `¥${currentPrice.toLocaleString()}` : '—';

  if (isFinite(currentPrice)) {
    const globalDates = [...new Set(allRows.map(r => r.date))].sort();
    const globalPrev  = globalDates.length >= 2 ? globalDates[globalDates.length - 2] : null;
    const prevRow = globalPrev
      ? statRows.filter(r => r.date <= globalPrev)
          .sort((a, b) => b.date.localeCompare(a.date))[0] || null
      : null;
    if (prevRow) {
      const diff = currentPrice - prevRow.price;
      const sign = diff >= 0 ? '+' : '';
      priceSubEl.textContent = `前日比 ${sign}¥${diff.toLocaleString()}`;
      priceWrap.className    = 'stat-card ' + (diff > 0 ? 'green' : diff < 0 ? 'red' : '');
    } else {
      priceSubEl.textContent = '前日比 —';
      priceWrap.className    = 'stat-card';
    }
  } else {
    priceSubEl.textContent = '—';
    priceWrap.className    = 'stat-card';
  }

  // ── 買取率 / 市場比 ──────────────────────────────────
  const msrp     = getMsrpLatest(productName);
  const rateWrap = document.getElementById('sc-rate-wrap');
  document.getElementById('sc-rate-label').textContent = getPriceLabel(productName);
  if (msrp && isFinite(currentPrice)) {
    const rate = calcRate(currentPrice, msrp);
    document.getElementById('sc-rate').textContent     = rate !== null ? `${rate}%` : '—';
    document.getElementById('sc-rate-sub').textContent = `${getPriceSubLabel(productName)} ¥${msrp.toLocaleString()}`;
    rateWrap.className = 'stat-card ' + (rate >= 75 ? 'green' : rate >= 50 ? 'yellow' : 'red');
  } else {
    document.getElementById('sc-rate').textContent     = '—';
    document.getElementById('sc-rate-sub').textContent = '—';
    rateWrap.className = 'stat-card';
  }

  // ── 30日平均 ──────────────────────────────────────────
  const d30ago = new Date(latestDate);
  d30ago.setDate(d30ago.getDate() - 29);
  const d30agoStr   = d30ago.toISOString().split('T')[0];
  const recentDates = statDates.filter(d => d >= d30agoStr);
  const dailyPrices = recentDates.map(d => {
    const r = statRows.filter(x => x.date === d)[0];
    return r ? r.price : null;
  }).filter(p => p !== null);
  const avg30 = dailyPrices.length
    ? Math.round(dailyPrices.reduce((s, p) => s + p, 0) / dailyPrices.length)
    : null;
  const maxRow = statRows.reduce((a, b) => a.price > b.price ? a : b);
  document.getElementById('sc-avg30').textContent     = avg30 ? `¥${avg30.toLocaleString()}` : '—';
  document.getElementById('sc-avg30-sub').textContent = `過去最高 ¥${maxRow.price.toLocaleString()}`;

  statCards.style.display = 'flex';
}

// サブカテゴリタブ描画
// ─────────────────────────────────────────────────────────────────────
function renderSubcatTabs() {
  const container = document.getElementById('subcat-tabs');
  const subcats = SUBCATEGORIES[currentCat];
  container.innerHTML = '';
  if (!subcats) return;
  subcats.forEach(sc => {
    const btn = document.createElement('button');
    btn.className = 'subcat-tab' + (currentSubcat === sc.id ? ' active' : '');
    btn.textContent = sc.label;
    btn.addEventListener('click', () => {
      currentSubcat = sc.id;
      renderSubcatTabs();

// ─────────────────────────────────────────────────────────────────────
// 商品リスト描画
// ─────────────────────────────────────────────────────────────────────
function renderProductList() {
  const query = document.getElementById('search').value.toLowerCase();
  let products = getProductsInCategory(currentCat);
  if (query) products = products.filter(n => n.toLowerCase().includes(query));

  // サブカテゴリフィルタ
  const subcats = SUBCATEGORIES[currentCat];
  const activeSc = subcats ? subcats.find(sc => sc.id === currentSubcat) : null;
  if (activeSc) products = products.filter(n => matchSubcat(n, activeSc));

  // データがない商品マスタ項目も表示（価格なし）
  const allMasterNames = Object.keys(PRODUCT_CATEGORIES);
  const additionalMaster = allMasterNames.filter(n => {
    if (!products.includes(n)) {
      if (filterFavorites && !favorites.has(n)) return false;
      if (currentCat !== 'all' && (PRODUCT_CATEGORIES[n] || 'その他') !== currentCat) return false;
      if (query && !n.toLowerCase().includes(query)) return false;
      if (activeSc && !matchSubcat(n, activeSc)) return false;
      return true;
    }
    return false;
  });
  // お気に入りフィルタ・買取率ソート適用
  let allProducts = filterFavorites
    ? [...products, ...additionalMaster].filter(n => favorites.has(n))
    : [...products, ...additionalMaster];

  if (sortByRate) {
    allProducts.sort((a, b) => {
      const ra = getRateForProduct(a), rb = getRateForProduct(b);
      if (ra === null && rb === null) return 0;
      if (ra === null) return 1;
      if (rb === null) return -1;
      return rb - ra;
    });
  }

  const list = document.getElementById('product-list');
  list.innerHTML = '';

  if (!allProducts.length) {
    list.innerHTML = '<div style="padding:1rem;color:var(--text-muted);text-align:center">該当なし</div>';
    return;
  }

  allProducts.forEach(name => {
    const latest = getProductLatestPrices(name);
    const item = document.createElement('div');
    item.className = 'product-item' + (name === currentProduct ? ' selected' : '');
    item.dataset.name = name;

    // 商品名 + JAN コード
    const nameWrap = document.createElement('div');
    nameWrap.className = 'prod-name-wrap';

    const nameEl = document.createElement('div');
    nameEl.className = 'prod-name';
    nameEl.title = name;
    nameEl.textContent = name;
    nameWrap.appendChild(nameEl);

    const jan = janMap[name];
    if (jan) {
      const janEl = document.createElement('div');
      janEl.className = 'prod-jan';
      janEl.textContent = jan;
      nameWrap.appendChild(janEl);
    }

    const pricesEl = document.createElement('div');
    pricesEl.className = 'prod-prices';

    // ★ お気に入りボタン
    const favBtn = document.createElement('button');
    const isFav = favorites.has(name);
    favBtn.className = 'fav-btn' + (isFav ? ' active' : '');
    favBtn.textContent = isFav ? '⭐' : '☆';
    favBtn.title = isFav ? 'お気に入り解除' : 'お気に入り登録';
    favBtn.addEventListener('click', e => toggleFavorite(name, e));
    pricesEl.appendChild(favBtn);

    const ichome = latest['買取一丁目'];
    if (!ichome) {
      const nd = document.createElement('span');
      nd.className = 'no-data';
      nd.textContent = 'データなし';
      pricesEl.appendChild(nd);
    } else {
      const msrp = getMsrpLatest(name);
      const rate = calcRate(ichome.price, msrp);
      if (rate !== null) {
        const badge = document.createElement('span');
        badge.className = `rate-badge ${rateClass(rate)}`;
        badge.textContent = `${rate}%`;
        badge.title = `買取一丁目 ¥${ichome.price.toLocaleString()} / 定価 ¥${msrp.toLocaleString()}`;
        pricesEl.appendChild(badge);
      }
    }

    item.appendChild(nameWrap);
    item.appendChild(pricesEl);
    item.addEventListener('click', () => selectProduct(name));
    list.appendChild(item);
  });
}

function renderChart(productName) {
  const placeholder = document.getElementById('placeholder');
  const canvas = document.getElementById('myChart');
  const titleEl = document.getElementById('product-title');
  const tableWrap = document.getElementById('data-table-wrap');

  const dates = buildChartDates(productName);
  const rows = allRows.filter(r => r.product_name === productName);

  document.getElementById('pt-name').textContent = productName;
  document.getElementById('pt-cat').textContent =
    PRODUCT_CATEGORIES[productName] || 'その他';



  const ptLink = document.getElementById('pt-link');
  const url = urlMap[productName];
  if (url) {
    ptLink.href = url;
    ptLink.classList.remove('hidden');
  } else {
    ptLink.classList.add('hidden');
  }
  titleEl.style.display = 'flex';

  // 商品別スタッツカード更新
  updateProductCards(productName);

  if (!rows.length) {
    placeholder.style.display = 'flex';
    placeholder.innerHTML = '<div class="icon">📭</div><div>このデータはまだ収集されていません</div>';
    canvas.style.display = 'none';
    document.getElementById('chart-store-filter').style.display = 'none';
    document.getElementById('period-tabs').style.display = 'none';
    tableWrap.style.display = 'none';
    return;
  }

  placeholder.style.display = 'none';
  canvas.style.display = 'block';

  // 期間切り替えタブを表示し、現在の選択を反映
  const periodTabs = document.getElementById('period-tabs');
  periodTabs.style.display = 'flex';
  periodTabs.querySelectorAll('.period-tab').forEach(t =>
    t.classList.toggle('active', Number(t.dataset.days) === currentPeriod));

  // Chart.js データセット構築
  const YAHOO_STORES = new Set(['ヤフオク 最安', 'ヤフオク 中央値', 'ヤフオク 最高']);
  // 買取一丁目など日次ストア: 日付がない場合は直前の価格を引き継ぐ（前値補完）
  const storeData = s => {
    const storeRows = rows.filter(x => x.store === s).sort((a, b) => a.date.localeCompare(b.date));
    // 期間の開始日より前の最新価格で初期化（前値補完が窓の先頭から効くように）
    const windowStart = dates[0];
    let last = null;
    for (const x of storeRows) {
      if (x.date < windowStart) last = x.price; else break;
    }
    return dates.map(d => {
      const r = storeRows.find(x => x.date === d);
      if (r) last = r.price;
      return last;
    });
  };
  // ヤフオクなど週次ストア: 実際にデータがある日のみプロット（補完しない）
  const storeDataExact = s => {
    const storeRows = rows.filter(x => x.store === s);
    return dates.map(d => {
      const r = storeRows.find(x => x.date === d);
      return r ? r.price : null;
    });
  };

  // 通常ストア（ヤフオク以外）
  const normalStores = [...new Set(rows.map(r => r.store))].filter(s => !YAHOO_STORES.has(s));
  const datasets = normalStores.map(store => {
    const color = STORE_COLORS[store] || { border: '#aaa', bg: 'rgba(170,170,170,0.1)', dash: [] };
    return {
      label: store,
      data: storeData(store),
      borderColor: color.border,
      backgroundColor: color.bg,
      borderWidth: store === '買取商店' ? 3 : 2,
      borderDash: color.dash || [],
      pointBorderColor: color.border,
      pointBackgroundColor: '#1a1d27',
      pointRadius: 4,
      pointHoverRadius: 6,
      fill: false,
      tension: 0.3,
      spanGaps: true,
    };
  });

  // ヤフオク: エラーバー（最安〜最高）＋中央値ライン
  if (rows.some(r => YAHOO_STORES.has(r.store))) {
    // 最高・最安は不可視データとして保持（プラグインがエラーバー描画に使用）
    datasets.push({
      label: 'ヤフオク 最高',
      data: storeDataExact('ヤフオク 最高'),
      borderColor: 'transparent',
      backgroundColor: 'transparent',
      borderWidth: 0,
      pointRadius: 0,
      pointHoverRadius: 0,
      fill: false,
      spanGaps: true,
    });
    datasets.push({
      label: 'ヤフオク 最安',
      data: storeDataExact('ヤフオク 最安'),
      borderColor: 'transparent',
      backgroundColor: 'transparent',
      borderWidth: 0,
      pointRadius: 0,
      pointHoverRadius: 0,
      fill: false,
      spanGaps: true,
    });
    // 中央値（メインライン）
    const yahooColor = STORE_COLORS['ヤフオク 中央値'];
    datasets.push({
      label: 'ヤフオク 中央値',
      data: storeDataExact('ヤフオク 中央値'),
      borderColor: yahooColor.border,
      backgroundColor: 'transparent',
      borderWidth: 2.5,
      borderDash: yahooColor.dash,
      pointBorderColor: yahooColor.border,
      pointBackgroundColor: '#1a1d27',
      pointRadius: 4,
      pointHoverRadius: 6,
      fill: false,
      tension: 0.3,
      spanGaps: true,
    });
  }

  // 定価の基準線（値上げがあれば途中でステップアップする）
  const msrpLineData = dates.map(date => getMsrpForDate(productName, date));
  if (msrpLineData.some(v => v !== null)) {
    datasets.push({
      label: '定価',
      data: msrpLineData,
      borderColor: 'rgba(255,255,255,0.25)',
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      borderDash: [8, 5],
      pointRadius: 0,
      pointHoverRadius: 0,
      pointStyle: 'line',
      fill: false,
      tension: 0,
      spanGaps: true,
      order: 99,
    });
  }

  applyPlotVisibility(datasets);
  renderPlotFilters(datasets);

  if (myChart) myChart.destroy();

  // ヤフオク エラーバープラグイン（最安〜最高を縦棒＋キャップで描画）
  const yahooErrorBarPlugin = {
    id: 'yahooErrorBar',
    afterDatasetsDraw(chart) {
      const maxIdx = chart.data.datasets.findIndex(d => d.label === 'ヤフオク 最高');
      const minIdx = chart.data.datasets.findIndex(d => d.label === 'ヤフオク 最安');
      const midIdx = chart.data.datasets.findIndex(d => d.label === 'ヤフオク 中央値');
      if (maxIdx < 0 || minIdx < 0 || midIdx < 0) return;

      const ctx2d = chart.ctx;
      const meta  = chart.getDatasetMeta(midIdx);
      const hiArr = chart.data.datasets[maxIdx].data;
      const loArr = chart.data.datasets[minIdx].data;

      ctx2d.save();
      ctx2d.strokeStyle = STORE_COLORS['ヤフオク 中央値'].border;
      ctx2d.lineWidth   = 1.5;
      const CAP = 5;

      meta.data.forEach((pt, i) => {
        const lo = loArr[i];
        const hi = hiArr[i];
        if (lo == null || hi == null) return;
        const x   = pt.x;
        const yLo = chart.scales.y.getPixelForValue(lo);
        const yHi = chart.scales.y.getPixelForValue(hi);
        // 縦棒
        ctx2d.beginPath(); ctx2d.moveTo(x, yLo); ctx2d.lineTo(x, yHi); ctx2d.stroke();
        // 下キャップ
        ctx2d.beginPath(); ctx2d.moveTo(x - CAP, yLo); ctx2d.lineTo(x + CAP, yLo); ctx2d.stroke();
        // 上キャップ
        ctx2d.beginPath(); ctx2d.moveTo(x - CAP, yHi); ctx2d.lineTo(x + CAP, yHi); ctx2d.stroke();
      });

      ctx2d.restore();
    },
  };

  myChart = new Chart(canvas, {
    plugins: [yahooErrorBarPlugin],
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: false,
          labels: {
            color: '#e4e6f0',
            font: { size: 12 },
            padding: 16,
            usePointStyle: true,
            filter: item => item.text !== 'ヤフオク 最高' && item.text !== 'ヤフオク 最安',
          },
          onClick: (_event, legendItem, legend) => {
            const label = legendItem.text;
            if (hiddenPlots.has(label)) hiddenPlots.delete(label);
            else hiddenPlots.add(label);
            saveHiddenPlots();
            applyPlotVisibility(legend.chart.data.datasets);
            legend.chart.update();
            renderPlotFilters(legend.chart.data.datasets);
          },
        },
        tooltip: {
          backgroundColor: '#1a1d27',
          borderColor: '#2e3248',
          borderWidth: 1,
          titleColor: '#e4e6f0',
          bodyColor: '#b0b3c8',
          callbacks: {
            label: ctx => {
              if (ctx.dataset.label === 'ヤフオク 最高' || ctx.dataset.label === 'ヤフオク 最安') return null;
              return ` ${ctx.dataset.label}: ¥${(ctx.parsed.y || 0).toLocaleString()}`;
            },
          },
        },
      },
      scales: {
        x: {
          grid: { color: '#2e3248' },
          ticks: { color: '#7a7f99', maxTicksLimit: 10 },
        },
        y: {
          grid: { color: '#2e3248' },
          ticks: {
            color: '#7a7f99',
            callback: v => '¥' + v.toLocaleString(),
          },
          beginAtZero: false,
        },
      },
    },
  });

  // ── ヤフオク専用テーブル ──────────────────────────────
  const tbody = document.getElementById('data-tbody');
  tbody.innerHTML = '';

  const yahooRows = rows.filter(r => r.store.startsWith('ヤフオク'));
  if (!yahooRows.length) {
    tableWrap.style.display = 'none';
  } else {
    tableWrap.style.display = 'block';
    // 最新のヤフオクスクレイプ日
    const yahooDate = [...new Set(yahooRows.map(r => r.date))].sort().pop();
    const msrpY = getMsrpForDate(productName, yahooDate);
    const getYCell = store => {
      const r = yahooRows.find(x => x.store === store && x.date === yahooDate);
      if (!r) return '<span style="color:var(--text-muted)">—</span>';
      const rate = calcRate(r.price, msrpY);
      const badge = rate !== null
        ? `<br><span class="rate-badge ${rateClass(rate)}">${rate}%</span>`
        : '';
      return `¥${r.price.toLocaleString()}${badge}`;
    };
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${yahooDate}</td>
      <td>${getYCell('ヤフオク 最高')}</td>
      <td>${getYCell('ヤフオク 中央値')}</td>
      <td>${getYCell('ヤフオク 最安')}</td>
    `;
    tbody.appendChild(tr);
  }
}

// ─────────────────────────────────────────────────────────────────────
// CSV 読み込み → 初期化
// ─────────────────────────────────────────────────────────────────────
function parseMsrpCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return;
  const headers = lines[0].split(',').map(h => h.trim());
  const nameIdx = headers.indexOf('product_name');
  const msrpIdx = headers.indexOf('msrp');
  const dateIdx = headers.indexOf('effective_date');
  const typeIdx = headers.indexOf('price_type');
  if (nameIdx < 0 || msrpIdx < 0) return;
  lines.slice(1).forEach(line => {
    const vals = line.split(',');
    const name  = (vals[nameIdx] || '').trim();
    const price = parseInt(vals[msrpIdx], 10);
    const effDate = (dateIdx >= 0 ? vals[dateIdx] || '' : '').trim() || '2000-01-01';
    const ptype = typeIdx >= 0 ? (vals[typeIdx] || '').trim() : '';
    if (name && price > 0) {
      if (!msrpHistory[name]) msrpHistory[name] = [];
      msrpHistory[name].push({ effective_date: effDate, msrp: price });
      if (ptype) priceTypeMap[name] = ptype;
    }
  });
}

function getPriceLabel(name) {
  return priceTypeMap[name] === 'market' ? '市場比' : '買取率';
}
function getPriceSubLabel(name) {
  return priceTypeMap[name] === 'market' ? '市場' : '定価';
}

async function loadData() {
  const badge = document.getElementById('status-badge');
  // ブラウザ・CDN キャッシュ回避用バージョン文字列
  const cv = Date.now();
  try {
    // prices.csv 読み込み
    const priceCandidates = ['./prices.csv', '../data/prices.csv', 'prices.csv'];
    let text = null;
    for (const path of priceCandidates) {
      try {
        const resp = await fetch(`${path}?v=${cv}`);
        if (resp.ok) { text = await resp.text(); break; }
      } catch (_) {}
    }
    if (!text) throw new Error('prices.csv が見つかりません');
    allRows = parseCSV(text);

    // msrp.csv 読み込み（失敗しても続行）
    const msrpCandidates = ['./msrp.csv', '../data/msrp.csv', 'msrp.csv'];
    for (const path of msrpCandidates) {
      try {
        const resp = await fetch(`${path}?v=${cv}`);
        if (resp.ok) { parseMsrpCSV(await resp.text()); break; }
      } catch (_) {}
    }

    // last_scrape.txt から実際のスクレイプ日を取得（価格変化なし日も正しく表示）
    const scrapeMarkerCandidates = ['./last_scrape.txt', '../data/last_scrape.txt'];
    for (const path of scrapeMarkerCandidates) {
      try {
        const resp = await fetch(`${path}?v=${cv}`);
        if (resp.ok) {
          const d = (await resp.text()).trim();
          if (d) document.getElementById('last-updated').textContent = `最終更新: ${d}`;
          break;
        }
      } catch (_) {}
    }

    if (allRows.length === 0) {
      badge.textContent = '⚠ データ空';
      badge.className = 'error';
    }

    updateSummaryCards();
    updateFavBtn();
    renderSubcatTabs();
    renderProductList();

    const productParam = new URLSearchParams(location.search).get('product');
    if (productParam && PRODUCT_CATEGORIES[productParam]) {
      const cat = PRODUCT_CATEGORIES[productParam] || 'その他';
      document.querySelectorAll('.cat-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.cat === cat)
      );
      currentCat = cat;
      currentSubcat = 'all';
      renderSubcatTabs();
      renderProductList();
      selectProduct(productParam);
    }
  } catch (e) {
    badge.textContent = '⚠ 読込失敗';
    badge.className = 'error';
    console.error(e);
    document.getElementById('placeholder').innerHTML =
      `<div class="icon">⚠️</div><div>${e.message}</div>`;
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

// ─────────────────────────────────────────────────────────────────────
// サイドバー検索（名前・JAN部分一致 → インライン結果パネル）
// ─────────────────────────────────────────────────────────────────────
function searchAllProducts(query) {
  if (!query.trim()) return [];
  const q = query.toLowerCase();
  const allNames = Object.keys(PRODUCT_CATEGORIES);
  const matched = allNames.filter(name => {
    if (name.toLowerCase().includes(q)) return true;
    const jan = janMap[name] || '';
    return jan && jan.includes(q);
  });
  // 前方一致を優先
  matched.sort((a, b) => {
    const as = a.toLowerCase().startsWith(q) ? 0 : 1;
    const bs = b.toLowerCase().startsWith(q) ? 0 : 1;
    return as - bs || a.localeCompare(b);
  });
  return matched.slice(0, 40);
}

function renderSidebarSearch(query) {
  const resultsEl = document.getElementById('search-results');
  const listEl    = document.getElementById('product-list');

  if (!query.trim()) {
    // 検索クリア → 通常リストに戻す
    resultsEl.classList.add('hidden');
    resultsEl.innerHTML = '';
    listEl.style.display = '';
    return;
  }

  const results = searchAllProducts(query);
  listEl.style.display = 'none';
  resultsEl.classList.remove('hidden');
  resultsEl.innerHTML = '';

  if (!results.length) {
    resultsEl.innerHTML = '<div class="sri-empty">該当する商品が見つかりません</div>';
    return;
  }

  results.forEach(name => {
    const el = document.createElement('div');
    el.className = 'sri';

    const prices    = Object.values(getProductLatestPrices(name));
    const bestPrice = prices.length ? Math.max(...prices.map(r => r.price)) : null;
    const jan       = janMap[name] || '';
    const cat       = PRODUCT_CATEGORIES[name] || 'その他';
    const msrpSri   = getMsrpLatest(name);
    const rateSri   = calcRate(bestPrice, msrpSri);
    const rateHtml  = rateSri !== null
      ? `<span class="rate-badge ${rateClass(rateSri)}" style="font-size:0.6rem">${rateSri}%</span>`
      : '';

    el.innerHTML = `
      <div class="sri-left">
        <div class="sri-name" title="${name}">${name}</div>
        ${jan ? `<div class="sri-jan">${jan}</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0">
        <div style="display:flex;align-items:center;gap:4px">${rateHtml}<div class="sri-price${bestPrice ? '' : ' no-data'}">${bestPrice ? '¥' + bestPrice.toLocaleString() : '—'}</div></div>
        <div style="font-size:0.65rem;color:var(--text-muted)">${cat}</div>
      </div>`;

    el.addEventListener('click', () => {
      // カテゴリタブ切替
      document.querySelectorAll('.cat-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.cat === cat)
      );
      currentCat    = cat;
      currentSubcat = 'all';
      renderSubcatTabs();
      // 検索クリア → 通常リストに戻す
      document.getElementById('search').value = '';
      resultsEl.classList.add('hidden');
      resultsEl.innerHTML = '';
      listEl.style.display = '';
      renderProductList();
      selectProduct(name);
      // 選択アイテムへスクロール
      setTimeout(() => {
        const sel = document.querySelector('.product-item.selected');
        if (sel) sel.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 60);
    });

    resultsEl.appendChild(el);
  });
}

// ─────────────────────────────────────────────────────────────────────
// バーコードスキャナ
//   Android Chrome 83+  → BarcodeDetector でリアルタイム映像スキャン
//   iOS Safari / 他     → 写真を撮影して静止画からデコード（html5-qrcode scanFile）
// ─────────────────────────────────────────────────────────────────────
// バーコードスキャナ
//   Android Chrome 83+  → BarcodeDetector でリアルタイム映像スキャン
//   iOS Safari / 他     → html5-qrcode でリアルタイム映像スキャン
//                         ※ formatsToSupport はコンストラクタに渡す（スキャン設定ではない）
// ─────────────────────────────────────────────────────────────────────
const _hasBarcodeDetector = typeof BarcodeDetector !== 'undefined';
let _scanStream    = null;
let _scanAnimFrame = null;
let _quaggaRunning = false;

function _applyBarcode(val) {
  const el = document.getElementById('search');
  el.value = val;
  renderSidebarSearch(val);
  el.focus();
}

// ── Android Chrome: BarcodeDetector リアルタイム ─────────────────────
async function _startNativeScanner() {
  const status = document.getElementById('barcode-status');
  const reader = document.getElementById('barcode-reader');
  status.textContent = 'カメラを起動中…';
  reader.innerHTML   = '';

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
    });
  } catch {
    status.textContent = 'カメラにアクセスできません。ブラウザの権限設定を確認してください。';
    return;
  }
  _scanStream = stream;

  const video = document.createElement('video');
  video.srcObject = stream;
  video.setAttribute('playsinline', '');
  video.muted = true;
  video.style.cssText = 'width:100%;max-height:260px;display:block;object-fit:cover;';
  reader.appendChild(video);
  try { await video.play(); } catch {}
  status.textContent = 'バーコードをカメラに向けてください';

  const detector = new BarcodeDetector({ formats: ['ean_13','ean_8','upc_a','upc_e','code_128','code_39'] });
  const scan = async () => {
    if (!_scanStream) return;
    try {
      for (const code of await detector.detect(video)) {
        const val = code.rawValue.trim();
        if (/^\d{8,14}$/.test(val)) { closeBarcodeScanner(); _applyBarcode(val); return; }
      }
    } catch {}
    // 60fps は過負荷になるため 200ms 間隔でスキャン
    _scanAnimFrame = setTimeout(scan, 200);
  };
  _scanAnimFrame = setTimeout(scan, 0);
}

// ── iOS / Safari: Quagga2 リアルタイム映像（1Dバーコード特化）────────
function _startQuaggaScanner() {
  const status = document.getElementById('barcode-status');
  const reader = document.getElementById('barcode-reader');
  status.textContent = 'カメラを起動中…';
  reader.innerHTML   = '';

  Quagga.init({
    inputStream: {
      type: 'LiveStream',
      target: reader,
      constraints: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1280 },
        height: { ideal: 720 },
      },
    },
    decoder: {
      readers: ['ean_reader', 'ean_8_reader', 'code_128_reader', 'upc_reader', 'upc_e_reader'],
      tryHarder: true,
    },
    locate: true,
    locator: { patchSize: 'medium', halfSample: true },
  }, (err) => {
    if (err) {
      status.textContent = `カメラにアクセスできません: ${err?.message ?? err}`;
      return;
    }
    Quagga.start();
    _quaggaRunning = true;
    status.textContent = 'バーコードをカメラに向けてください';
  });

  Quagga.onDetected((result) => {
    const val = (result.codeResult?.code ?? '').trim();
    if (!/^\d{8,14}$/.test(val)) return;
    // 誤検知除去: decodedCodes の平均エラー率が低いものだけ採用
    const errs = (result.codeResult.decodedCodes ?? [])
      .map(x => x.error).filter(e => e != null);
    const avgErr = errs.length ? errs.reduce((a, b) => a + b, 0) / errs.length : 1;
    if (avgErr > 0.25) return;
    closeBarcodeScanner();
    _applyBarcode(val);
  });
}

// ── 共通: 開く / 閉じる ─────────────────────────────────────────────
async function openBarcodeScanner() {
  const modal = document.getElementById('barcode-modal');
  const btn   = document.getElementById('sidebar-barcode-btn');
  modal.classList.remove('hidden');
  btn.classList.add('scanning');
  document.getElementById('barcode-status').className = '';

  if (_hasBarcodeDetector) { await _startNativeScanner(); }
  else                     { _startQuaggaScanner(); }
}

function closeBarcodeScanner() {
  const modal = document.getElementById('barcode-modal');
  const btn   = document.getElementById('sidebar-barcode-btn');
  modal.classList.add('hidden');
  btn.classList.remove('scanning');
  if (_scanAnimFrame) { clearTimeout(_scanAnimFrame); _scanAnimFrame = null; }
  if (_scanStream)    { _scanStream.getTracks().forEach(t => t.stop()); _scanStream = null; }
  if (_quaggaRunning) { try { Quagga.stop(); } catch {} _quaggaRunning = false; }
  document.getElementById('barcode-reader').innerHTML = '';
}

document.getElementById('sidebar-barcode-btn').addEventListener('click', openBarcodeScanner);
document.getElementById('barcode-close').addEventListener('click', closeBarcodeScanner);
document.getElementById('barcode-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('barcode-modal')) closeBarcodeScanner();
});

loadData();
</script>
