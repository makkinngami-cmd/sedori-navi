name: Daily Price Scraper

on:
  schedule:
    # UTC 04:10 = JST 13:10（バックアップ用：ローカルトリガー失敗時のみ実質稼働）
    - cron: '10 4 * * *'
  workflow_dispatch:        # 手動実行ボタンも有効化

permissions:
  contents: write           # CSVをコミット・プッシュするため

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. チェックアウト ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python セットアップ ───────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      # ── 3. 依存関係インストール ──────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # ── 4. スクレイパー実行 ──────────────────────────────────────
      - name: Run scraper
        run: |
          cd scraper
          python scrape.py
        env:
          PYTHONUNBUFFERED: "1"

      # ── 5. 実行確認（マーカーファイルで判定）────────────────────
      - name: Verify scraped records
        run: |
          TODAY=$(python -c "from datetime import datetime, timezone, timedelta; print(datetime.now(timezone(timedelta(hours=9))).strftime('%Y-%m-%d'))")
          if [ ! -f data/last_scrape.txt ] || [ "$(cat data/last_scrape.txt)" != "$TODAY" ]; then
            echo "ERROR: Scrape marker not found for $TODAY"
            exit 1
          fi
          echo "Scrape verified for $TODAY"

      # ── 6. prices.csv / msrp.csv / マーカー を docs/ にもコピー ─────
      - name: Copy CSVs to docs/
        run: |
          cp data/prices.csv docs/prices.csv
          cp data/msrp.csv docs/msrp.csv
          cp data/last_scrape.txt docs/last_scrape.txt

      # ── 7. 変更があればコミット & プッシュ ───────────────────────
      - name: Commit and push updated prices.csv
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.csv docs/prices.csv docs/msrp.csv data/last_scrape.txt docs/last_scrape.txt
          # 変更がなければ何もしない
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update prices $(date +'%Y-%m-%d')"
            git push
          fi
