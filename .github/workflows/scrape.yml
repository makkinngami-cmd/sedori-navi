name: Daily Price Scraper

on:
  schedule:
    # JST 12:00〜21:00 の毎時リトライ（UTC 03:00〜12:00）
    # 1回成功すれば以降はスキップ処理で数秒で終了
    - cron: '0 3 * * *'   # JST 12:00
    - cron: '0 4 * * *'   # JST 13:00
    - cron: '0 5 * * *'   # JST 14:00
    - cron: '0 6 * * *'   # JST 15:00
    - cron: '0 7 * * *'   # JST 16:00
    - cron: '0 8 * * *'   # JST 17:00
    - cron: '0 9 * * *'   # JST 18:00
    - cron: '0 10 * * *'  # JST 19:00
    - cron: '0 11 * * *'  # JST 20:00
    - cron: '0 12 * * *'  # JST 21:00
  workflow_dispatch:        # 手動実行ボタンも有効化

permissions:
  contents: write           # CSVをコミット・プッシュするため

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. チェックアウト ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python セットアップ ───────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      # ── 3. 依存関係インストール ──────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # ── 4. スクレイパー実行 ──────────────────────────────────────
      - name: Run scraper
        run: |
          cd scraper
          python scrape.py
        env:
          PYTHONUNBUFFERED: "1"

      # ── 5. 取得件数チェック（0件ならエラー終了）────────────────
      - name: Verify scraped records
        run: |
          TODAY=$(python -c "from datetime import datetime, timezone, timedelta; print(datetime.now(timezone(timedelta(hours=9))).strftime('%Y-%m-%d'))")
          COUNT=$(python -c "
          import csv
          with open('data/prices.csv', encoding='utf-8') as f:
              rows = [r for r in csv.DictReader(f) if r.get('date') == '$TODAY']
          print(len(rows))
          ")
          echo "Today's records: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: No records scraped for $TODAY"
            exit 1
          fi

      # ── 6. prices.csv を docs/ にもコピー（GitHub Pages 用）─────
      - name: Copy prices.csv to docs/
        run: cp data/prices.csv docs/prices.csv

      # ── 7. 変更があればコミット & プッシュ ───────────────────────
      - name: Commit and push updated prices.csv
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.csv docs/prices.csv
          # 変更がなければ何もしない
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update prices $(date +'%Y-%m-%d') [skip ci]"
            git push
          fi
