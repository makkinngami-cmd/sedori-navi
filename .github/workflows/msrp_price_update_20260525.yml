name: MSRP Price Update 2026-05-25 (Nintendo Switch 値上げ)

on:
  schedule:
    - cron: '5 15 24 5 *'   # JST 2026-05-25 00:05（UTC 5/24 15:05）
  workflow_dispatch:          # 手動実行ボタン

permissions:
  contents: write

jobs:
  update-msrp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply Nintendo Switch price increases
        run: |
          python - <<'EOF'
          import csv

          MSRP_FILE = 'data/msrp.csv'
          EFFECTIVE_DATE = '2026-05-25'
          SOURCE_URL = 'https://www.nintendo.co.jp/corporate/release/en/2026/260508.html'

          # 追加する新定価行（既存行は変更しない）
          NEW_PRICES = {
              'Switch2 国内版':        59980,
              'Switch 有機白':         47980,
              'Switch 有機ネオン':     47980,
              'Switch 新型ネオン':     43980,
              'Switch 新型グレー':     43980,
              'Switch Liteグレー':     29980,
              'Switch Liteブルー':     29980,
              'Switch Liteコーラル':   29980,
              'Switch Liteターコイズ': 29980,
              'Switch Liteイエロー':   29980,
          }

          FIELDS = ['product_name', 'msrp', 'effective_date', 'source_url', 'matched_title']

          with open(MSRP_FILE, newline='', encoding='utf-8') as f:
              rows = list(csv.DictReader(f))

          # 既に同じ effective_date の行が存在する場合はスキップ
          existing_keys = {(r['product_name'], r.get('effective_date', '')) for r in rows}

          added = 0
          for name, price in NEW_PRICES.items():
              if (name, EFFECTIVE_DATE) not in existing_keys:
                  rows.append({
                      'product_name':  name,
                      'msrp':          price,
                      'effective_date': EFFECTIVE_DATE,
                      'source_url':    SOURCE_URL,
                      'matched_title': f'2026-05-25 値上げ後定価',
                  })
                  print(f'  追加: {name} → ¥{price} (from {EFFECTIVE_DATE})')
                  added += 1
              else:
                  print(f'  スキップ（既存）: {name}')

          with open(MSRP_FILE, 'w', newline='', encoding='utf-8') as f:
              w = csv.DictWriter(f, fieldnames=FIELDS)
              w.writeheader()
              w.writerows(rows)

          print(f'完了: {added} 件追加')
          EOF

      - name: Copy to docs/
        run: cp data/msrp.csv docs/msrp.csv

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/msrp.csv docs/msrp.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Nintendo Switch MSRP for 2026-05-25 price increase [skip ci]"
            git push
          fi
