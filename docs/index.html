<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>せどりナビ</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    /* ── リセット & 変数 ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3248;
      --accent: #5c73f2;
      --accent2: #f25c73;
      --text: #e4e6f0;
      --text-muted: #7a7f99;
      --green: #4caf87;
      --yellow: #f2c94c;
      --radius: 10px;
      --font: 'Segoe UI', 'Noto Sans JP', sans-serif;
    }
    html { font-size: 14px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ── ヘッダー ─────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #1a1d27 0%, #22263a 100%);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header h1 small {
      font-size: 0.6rem;
      font-weight: 400;
      margin-left: 0.4rem;
      vertical-align: middle;
      /* h1 の gradient text-fill を上書きして可視化 */
      -webkit-text-fill-color: var(--text-muted);
      background: none;
      opacity: 0.85;
    }
    #last-updated {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    #status-badge {
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    #status-badge.ok { color: var(--green); border-color: var(--green); }
    #status-badge.error { color: var(--accent2); border-color: var(--accent2); }

    /* ── レイアウト ─────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 57px);
    }

    /* ── サイドバー ─────────────────────────────────── */
    #sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* カテゴリタブ */
    #category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .cat-tab {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .cat-tab:hover { border-color: var(--accent); color: var(--text); }
    .cat-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* サブカテゴリタブ */
    #subcat-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
    }
    #subcat-tabs:empty { display: none; }
    .subcat-tab {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .subcat-tab:hover { border-color: var(--accent); color: var(--text); }
    .subcat-tab.active {
      background: rgba(92,115,242,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* 検索 */
    #search-wrap {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.35rem;
      align-items: center;
    }
    #search {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      padding: 0.45rem 0.75rem;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text-muted); }
    #sidebar-barcode-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: not-allowed;
      font-size: 0.95rem;
      line-height: 1;
      opacity: 0.45;
      padding: 0.38rem 0.45rem;
      flex-shrink: 0;
    }
    /* 検索結果パネル（サイドバー内インライン） */
    #search-results {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #search-results.hidden { display: none; }

    /* 商品リスト */
    #product-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .product-item {
      align-items: center;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      padding: 0.65rem 0.9rem;
      transition: background 0.1s;
    }
    .product-item:hover { background: var(--surface2); }
    .product-item.selected { background: rgba(92, 115, 242, 0.15); border-left: 3px solid var(--accent); }
    .product-item .prod-name-wrap {
      display: flex;
      flex-direction: column;
      gap: 1px;
      overflow: hidden;
      max-width: 180px;
    }
    .product-item .prod-name {
      font-size: 0.82rem;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .product-item .prod-jan {
      font-size: 0.62rem;
      color: var(--text-muted);
      letter-spacing: 0.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0.7;
    }
    .product-item .prod-prices {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      flex-shrink: 0;
    }
    .price-pill {
      background: var(--surface2);
      border-radius: 4px;
      font-size: 0.7rem;
      padding: 1px 5px;
      white-space: nowrap;
    }
    .price-pill.store-a { border-left: 2px solid var(--accent); }
    .price-pill.store-b { border-left: 2px solid var(--accent2); }
    .price-pill.store-c { border-left: 2px solid var(--green); }
    .no-data { color: var(--text-muted); font-size: 0.75rem; font-style: italic; }
    .rate-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .rate-badge.high   { background: rgba(76,175,135,0.18); color: var(--green); }
    .rate-badge.mid    { background: rgba(242,201,76,0.18); color: var(--yellow); }
    .rate-badge.low    { background: rgba(242,92,115,0.18); color: var(--accent2); }
    .rate-badge.nodata { background: transparent; color: var(--text-muted); }

    /* ── メインエリア ─────────────────────────────────── */
    #main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1.25rem 1.5rem;
      gap: 1rem;
    }

    /* サマリーカード */
    #summary-cards {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex: 1;
      min-width: 140px;
      padding: 0.9rem 1rem;
    }
    .card .card-label {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-bottom: 0.3rem;
    }
    .card .card-value {
      font-size: 1.3rem;
      font-weight: 700;
    }
    .card .card-sub {
      color: var(--text-muted);
      font-size: 0.72rem;
      margin-top: 0.2rem;
    }
    .card.green .card-value { color: var(--green); }
    .card.blue .card-value { color: var(--accent); }
    .card.red .card-value { color: var(--accent2); }
    .card.yellow .card-value { color: var(--yellow); }

    /* 商品タイトル */
    #product-title {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    #product-title span {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      color: var(--text-muted);
      vertical-align: middle;
    }
    #pt-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.2rem 0.6rem;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
      margin-left: auto;
    }
    #pt-link:hover { background: rgba(92,115,242,0.15); border-color: var(--accent); }
    #pt-link.hidden { display: none; }

    /* チャート */
    #chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex: 1;
      min-height: 0;
      padding: 1rem;
      position: relative;
    }
    #myChart { width: 100% !important; height: 100% !important; }

    /* プレースホルダー */
    #placeholder {
      align-items: center;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      height: 100%;
      justify-content: center;
    }
    #placeholder .icon { font-size: 3rem; opacity: 0.3; }

    /* テーブル */
    #data-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-height: 180px;
      overflow-y: auto;
    }
    table {
      border-collapse: collapse;
      font-size: 0.8rem;
      width: 100%;
    }
    thead th {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.5rem 0.75rem;
      text-align: left;
      position: sticky;
      top: 0;
    }
    tbody td {
      border-bottom: 1px solid var(--border);
      padding: 0.4rem 0.75rem;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--surface2); }

    /* ── ヘッダー検索 ───────────────────────────────────── */
    .sri {
      align-items: center;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      gap: 0.5rem;
      justify-content: space-between;
      padding: 0.5rem 0.9rem;
      transition: background 0.1s;
    }
    .sri:last-child { border-bottom: none; }
    .sri:hover { background: var(--surface2); }
    .sri-left { overflow: hidden; }
    .sri-name { font-size: 0.83rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sri-jan  { color: var(--text-muted); font-size: 0.7rem; letter-spacing: 0.04em; margin-top: 1px; }
    .sri-price { color: var(--accent); flex-shrink: 0; font-size: 0.78rem; font-weight: 600; }
    .sri-price.no-data { color: var(--text-muted); font-weight: 400; }
    .sri-empty { color: var(--text-muted); font-size: 0.82rem; padding: 0.75rem; text-align: center; }

    /* ── ローディング ─────────────────────────────────── */
    #loading {
      align-items: center;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      height: 100%;
      justify-content: center;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 999;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── レスポンシブ ─────────────────────────────────── */
    @media (max-width: 720px) {
      .app { grid-template-columns: 1fr; height: auto; }
      #sidebar { height: 50vh; }
      #main { height: auto; overflow-y: auto; padding: 1rem; }
      #chart-wrap { min-height: 280px; }
      #summary-cards .card { min-width: 120px; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>データを読み込んでいます…</div>
</div>

<header>
  <h1>📊 せどりナビ<small> ポイントせどり支援ツール</small></h1>
  <span id="status-badge">読込中</span>
  <span id="last-updated"></span>
</header>

<div class="app">
  <!-- ── サイドバー ──────────────────────────────── -->
  <aside id="sidebar">
    <div id="category-tabs">
      <button class="cat-tab active" data-cat="all">すべて</button>
      <button class="cat-tab" data-cat="ゲーム">🎮 ゲーム</button>
      <button class="cat-tab" data-cat="カメラ">📷 カメラ</button>
      <button class="cat-tab" data-cat="ポケカ">🃏 ポケカ</button>
      <button class="cat-tab" data-cat="ワンピ">🃏 ワンピ</button>
      <button class="cat-tab" data-cat="スマートフォン">📱 スマートフォン</button>
      <button class="cat-tab" data-cat="その他">📦 その他</button>
    </div>
    <div id="subcat-tabs"></div>
    <div id="search-wrap">
      <input id="search" type="search" placeholder="商品名・JANコードで検索…" autocomplete="off" spellcheck="false">
      <button id="sidebar-barcode-btn" title="バーコード読み取り（準備中）" disabled>📷</button>
    </div>
    <div id="search-results" class="hidden"></div>
    <div id="product-list"></div>
  </aside>

  <!-- ── メイン ─────────────────────────────────── -->
  <main id="main">
    <div id="summary-cards">
      <div class="card yellow">
        <div class="card-label">データ期間</div>
        <div class="card-value" id="date-range" style="font-size:1rem;letter-spacing:-0.01em">—</div>
        <div class="card-sub" id="date-range-sub">—</div>
      </div>
      <div class="card blue" id="card-alltime-wrap">
        <div class="card-label">過去最高買取</div>
        <div class="card-value" id="card-alltime-high">—</div>
        <div class="card-sub" id="card-alltime-high-sub">商品を選択</div>
      </div>
      <div class="card blue" id="card-avg30-wrap">
        <div class="card-label">直近30日平均</div>
        <div class="card-value" id="card-avg30">—</div>
        <div class="card-sub" id="card-avg30-sub">商品を選択</div>
      </div>
      <div class="card blue" id="card-vs-avg-wrap">
        <div class="card-label">現在 vs 30日平均</div>
        <div class="card-value" id="card-vs-avg">—</div>
        <div class="card-sub" id="card-vs-avg-sub">商品を選択</div>
      </div>
      <div class="card blue" id="card-msrp-wrap">
        <div class="card-label">定価 / 買取率</div>
        <div class="card-value" id="card-msrp-rate">—</div>
        <div class="card-sub" id="card-msrp-sub">商品を選択</div>
      </div>
    </div>

    <div id="product-title" style="display:none">
      <span id="pt-name">—</span>
      <span id="pt-cat">—</span>
      <span id="pt-msrp" style="display:none; color:var(--text-muted); font-size:0.75rem; font-weight:400">定価 —</span>
      <a id="pt-link" href="#" target="_blank" rel="noopener" class="hidden">🔗 買取一丁目</a>
    </div>

    <div id="chart-wrap">
      <div id="placeholder">
        <div class="icon">📈</div>
        <div>左のリストから商品を選んでください</div>
      </div>
      <canvas id="myChart" style="display:none"></canvas>
    </div>

    <div id="data-table-wrap" style="display:none">
      <table>
        <thead><tr>
          <th>日付</th>
          <th>店舗</th>
          <th>買取価格</th>
          <th>前日比</th>
          <th>定価</th>
          <th>買取率</th>
        </tr></thead>
        <tbody id="data-tbody"></tbody>
      </table>
    </div>
  </main>
</div>

// 同一商品に複数行持つことで値上げ・値下げの履歴を表現する

// ─────────────────────────────────────────────────────────────────────
// 定価ヘルパー（日付ベース）
// ─────────────────────────────────────────────────────────────────────
// 指定日付時点の有効な定価を返す（effective_date <= date の中で最新のもの）
function getMsrpForDate(name, date) {
  const history = msrpHistory[name];
  if (!history || !history.length) return null;
  let best = null;
  for (const entry of history) {
    if (entry.effective_date <= date) {
      if (!best || entry.effective_date > best.effective_date) best = entry;
    }
  }
  return best ? best.msrp : null;
}
// 今日時点の最新定価
function getMsrpLatest(name) {
  const today = new Date().toISOString().split('T')[0];
  return getMsrpForDate(name, today);
}

// 買取率の色クラス
function rateClass(pct) {
  if (pct === null) return 'nodata';
  if (pct >= 75) return 'high';
  if (pct >= 50) return 'mid';
  return 'low';
}
function calcRate(buyback, msrp) {
  if (!msrp || !buyback) return null;
  return Math.round((buyback / msrp) * 1000) / 10;  // 小数1桁
}

// ─────────────────────────────────────────────────────────────────────
// CSV パーサー
// ─────────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
    obj.price = parseInt(obj.price, 10) || 0;
    // JAN・URL マップを更新（最新行で上書き）
    if (obj.jan && obj.product_name) janMap[obj.product_name] = obj.jan;
    if (obj.url && obj.product_name) urlMap[obj.product_name] = obj.url;
    return obj;
  }).filter(r => r.date && r.product_name && r.store && r.price > 0);
}

// ─────────────────────────────────────────────────────────────────────
// データ集計ユーティリティ
// ─────────────────────────────────────────────────────────────────────
function getProductLatestPrices(productName) {
  // 商品名の全行 → 店舗ごとに最新日付の価格を返す
  const rows = allRows.filter(r => r.product_name === productName);
  const result = {};
  STORE_NAMES.forEach(s => {
    const storeRows = rows.filter(r => r.store === s).sort((a, b) => b.date.localeCompare(a.date));
    if (storeRows.length) result[s] = storeRows[0];
  });
  return result;
}

function getUniqueDates(productName) {
  return [...new Set(allRows.filter(r => r.product_name === productName).map(r => r.date))].sort();
}

function getProductsInCategory(cat) {
  // CSV に登録された商品の中からカテゴリでフィルタ
  const names = [...new Set(allRows.map(r => r.product_name))];
  if (cat === 'all') return names.sort();
  return names.filter(n => (PRODUCT_CATEGORIES[n] || 'その他') === cat).sort();
}

function updateSummaryCards() {
  const allDates = [...new Set(allRows.map(r => r.date))].sort();
  const latestDate = allDates[allDates.length - 1] || '—';
  const oldestDate = allDates[0] || '—';
  const storeCount = [...new Set(allRows.map(r => r.store))].length;

  const rangeEl = document.getElementById('date-range');
  const subEl   = document.getElementById('date-range-sub');
  if (allDates.length === 0) {
    rangeEl.textContent = '—';
    subEl.textContent   = '—';
  } else if (allDates.length === 1) {
    rangeEl.textContent = latestDate;
    subEl.textContent   = `${storeCount} 店舗`;
  } else {
    rangeEl.textContent = `${oldestDate} 〜`;
    subEl.textContent   = `${latestDate}  /  ${storeCount} 店舗`;
  }

  const badge = document.getElementById('status-badge');
  badge.textContent = allRows.length ? `✓ ${allRows.length}件` : '⚠ データなし';
  badge.className = 'ok';
  document.getElementById('last-updated').textContent = `最終更新: ${latestDate}`;
}

function updateProductCards(productName) {

  const noSel = !productName;
  const resetSub = noSel ? '商品を選択' : '—';
  document.getElementById('card-alltime-high').textContent     = '—';
  document.getElementById('card-alltime-high-sub').textContent = resetSub;
  document.getElementById('card-avg30').textContent            = '—';
  document.getElementById('card-avg30-sub').textContent        = resetSub;
  document.getElementById('card-vs-avg').textContent           = '—';
  document.getElementById('card-vs-avg-sub').textContent       = resetSub;
  document.getElementById('card-alltime-wrap').className       = 'card blue';
  document.getElementById('card-avg30-wrap').className         = 'card blue';
  document.getElementById('card-vs-avg-wrap').className        = 'card blue';
  document.getElementById('card-msrp-rate').textContent        = '—';
  document.getElementById('card-msrp-sub').textContent         = resetSub;
  document.getElementById('card-msrp-wrap').className          = 'card blue';

  // データ期間カード: 商品未選択はグローバル値に戻す
  if (!productName) {
    updateSummaryCards();
    return;
  }

  const rows = allRows.filter(r => r.product_name === productName);

  // ── データ期間（商品別）──────────────────────────────
  const rangeEl = document.getElementById('date-range');
  const subEl   = document.getElementById('date-range-sub');
  if (!rows.length) {
    rangeEl.textContent = '—';
    subEl.textContent   = 'データなし';
    return;
  }

  const dates = [...new Set(rows.map(r => r.date))].sort();
  const latestDate  = dates[dates.length - 1];
  const oldestDate  = dates[0];
  const storeCount  = [...new Set(rows.map(r => r.store))].length;

  if (dates.length === 1) {
    rangeEl.textContent = latestDate;
    subEl.textContent   = `${storeCount} 店舗`;
  } else {
    rangeEl.textContent = `${oldestDate} 〜`;
    subEl.textContent   = `${latestDate}  /  ${storeCount} 店舗`;
  }

  // ── 過去最高買取 ──────────────────────────────────────
  const maxRow = rows.reduce((a, b) => a.price > b.price ? a : b);
  document.getElementById('card-alltime-high').textContent     = `¥${maxRow.price.toLocaleString()}`;
  document.getElementById('card-alltime-high-sub').textContent = maxRow.date;

  // ── 直近30日の日次最高価格の平均 ──────────────────────
  const d30ago = new Date(latestDate);
  d30ago.setDate(d30ago.getDate() - 29);
  const d30agoStr   = d30ago.toISOString().split('T')[0];
  const recentDates = dates.filter(d => d >= d30agoStr);
  const dailyMaxes  = recentDates.map(d =>
    Math.max(...rows.filter(r => r.date === d).map(r => r.price))
  );
  const avg30 = dailyMaxes.length
    ? Math.round(dailyMaxes.reduce((s, p) => s + p, 0) / dailyMaxes.length)
    : null;

  document.getElementById('card-avg30').textContent     = avg30 ? `¥${avg30.toLocaleString()}` : '—';
  document.getElementById('card-avg30-sub').textContent =
    avg30 ? `直近 ${dailyMaxes.length} 日の平均` : '—';

  // ── 現在（最新日の最高）vs 30日平均 ──────────────────
  const currentPrice = Math.max(...rows.filter(r => r.date === latestDate).map(r => r.price));
  if (avg30 && isFinite(currentPrice)) {
    const diff   = currentPrice - avg30;
    const pct    = ((diff / avg30) * 100).toFixed(1);
    const sign   = diff >= 0 ? '+' : '';
    const absStr = `¥${Math.abs(diff).toLocaleString()}`;
    document.getElementById('card-vs-avg').textContent =
      diff >= 0 ? `+${absStr}` : `-${absStr}`;
    document.getElementById('card-vs-avg-sub').textContent = `${sign}${pct}% vs 30日平均`;
    document.getElementById('card-vs-avg-wrap').className  =
      'card ' + (diff > 0 ? 'green' : diff < 0 ? 'red' : 'blue');
  }

  // ── 定価 / 買取率 ─────────────────────────────────────
  const msrp = getMsrpLatest(productName);
  if (msrp && isFinite(currentPrice)) {
    const rate = calcRate(currentPrice, msrp);
    document.getElementById('card-msrp-rate').textContent     = rate !== null ? `${rate}%` : '—';
    document.getElementById('card-msrp-sub').textContent      = `定価 ¥${msrp.toLocaleString()}`;
    document.getElementById('card-msrp-wrap').className       =
      'card ' + (rate >= 75 ? 'green' : rate >= 50 ? 'yellow' : 'red');
  }
}

// ─────────────────────────────────────────────────────────────────────
// サブカテゴリタブ描画
// ─────────────────────────────────────────────────────────────────────
function renderSubcatTabs() {
  const container = document.getElementById('subcat-tabs');
  const subcats = SUBCATEGORIES[currentCat];
  container.innerHTML = '';
  if (!subcats) return;
  subcats.forEach(sc => {
    const btn = document.createElement('button');
    btn.className = 'subcat-tab' + (currentSubcat === sc.id ? ' active' : '');
    btn.textContent = sc.label;
    btn.addEventListener('click', () => {
      currentSubcat = sc.id;
      renderSubcatTabs();
      renderProductList();
    });
    container.appendChild(btn);
  });
}

// ─────────────────────────────────────────────────────────────────────
// 商品リスト描画
// ─────────────────────────────────────────────────────────────────────
function renderProductList() {
  const query = document.getElementById('search').value.toLowerCase();
  let products = getProductsInCategory(currentCat);
  if (query) products = products.filter(n => n.toLowerCase().includes(query));

  // サブカテゴリフィルタ
  const subcats = SUBCATEGORIES[currentCat];
  const activeSc = subcats ? subcats.find(sc => sc.id === currentSubcat) : null;
  if (activeSc) products = products.filter(n => matchSubcat(n, activeSc));

  // データがない商品マスタ項目も表示（価格なし）
  const allMasterNames = Object.keys(PRODUCT_CATEGORIES);
  const additionalMaster = allMasterNames.filter(n => {
    if (!products.includes(n)) {
      if (currentCat !== 'all' && (PRODUCT_CATEGORIES[n] || 'その他') !== currentCat) return false;
      if (query && !n.toLowerCase().includes(query)) return false;
      if (activeSc && !matchSubcat(n, activeSc)) return false;
      return true;
    }
    return false;
  });
  const allProducts = [...products, ...additionalMaster];

  const list = document.getElementById('product-list');
  list.innerHTML = '';

  if (!allProducts.length) {
    list.innerHTML = '<div style="padding:1rem;color:var(--text-muted);text-align:center">該当なし</div>';
    return;
  }

  allProducts.forEach(name => {
    const latest = getProductLatestPrices(name);
    const item = document.createElement('div');
    item.className = 'product-item' + (name === currentProduct ? ' selected' : '');
    item.dataset.name = name;

    // 商品名 + JAN コード
    const nameWrap = document.createElement('div');
    nameWrap.className = 'prod-name-wrap';

    const nameEl = document.createElement('div');
    nameEl.className = 'prod-name';
    nameEl.title = name;
    nameEl.textContent = name;
    nameWrap.appendChild(nameEl);

    const jan = janMap[name];
    if (jan) {
      const janEl = document.createElement('div');
      janEl.className = 'prod-jan';
      janEl.textContent = jan;
      nameWrap.appendChild(janEl);
    }

    const pricesEl = document.createElement('div');
    pricesEl.className = 'prod-prices';

    const sidebarKeys = Object.keys(latest).filter(s => SIDEBAR_STORES.has(s));
    if (sidebarKeys.length === 0) {
      const nd = document.createElement('span');
      nd.className = 'no-data';
      nd.textContent = 'データなし';
      pricesEl.appendChild(nd);
    } else {
      // 最高買取価格で買取率を計算
      const bestPrice = Math.max(...sidebarKeys.map(s => latest[s].price));
      const msrp = getMsrpLatest(name);
      const rate = calcRate(bestPrice, msrp);
      if (rate !== null) {
        const badge = document.createElement('span');
        badge.className = `rate-badge ${rateClass(rate)}`;
        badge.textContent = `${rate}%`;
        badge.title = `定価 ¥${msrp.toLocaleString()}`;
        pricesEl.appendChild(badge);
      }
      sidebarKeys.forEach((s, i) => {
        const pill = document.createElement('span');
        pill.className = `price-pill store-${['a','b','c'][i] || 'a'}`;
        pill.textContent = `¥${latest[s].price.toLocaleString()}`;
        pill.title = s;
        pricesEl.appendChild(pill);
      });
    }

    item.appendChild(nameWrap);
    item.appendChild(pricesEl);
    item.addEventListener('click', () => selectProduct(name));
    list.appendChild(item);
  });
}

// ─────────────────────────────────────────────────────────────────────
// 商品選択 → チャート描画
// ─────────────────────────────────────────────────────────────────────
function selectProduct(name) {
  currentProduct = name;
  renderProductList();
  renderChart(name);
}

function renderChart(productName) {
  const placeholder = document.getElementById('placeholder');
  const canvas = document.getElementById('myChart');
  const titleEl = document.getElementById('product-title');
  const tableWrap = document.getElementById('data-table-wrap');

  const dates = getUniqueDates(productName);
  const rows = allRows.filter(r => r.product_name === productName);

  document.getElementById('pt-name').textContent = productName;
  document.getElementById('pt-cat').textContent =
    PRODUCT_CATEGORIES[productName] || 'その他';

  // 定価バッジ
  const ptMsrp = document.getElementById('pt-msrp');
  const msrpVal = getMsrpLatest(productName);
  if (msrpVal) {
    ptMsrp.textContent = `定価 ¥${msrpVal.toLocaleString()}`;
    ptMsrp.style.display = '';
  } else {
    ptMsrp.style.display = 'none';
  }

  const ptLink = document.getElementById('pt-link');
  const url = urlMap[productName];
  if (url) {
    ptLink.href = url;
    ptLink.classList.remove('hidden');
  } else {
    ptLink.classList.add('hidden');
  }
  titleEl.style.display = 'flex';

  // 商品別スタッツカード更新
  updateProductCards(productName);

  if (!rows.length) {
    placeholder.style.display = 'flex';
    placeholder.innerHTML = '<div class="icon">📭</div><div>このデータはまだ収集されていません</div>';
    canvas.style.display = 'none';
    tableWrap.style.display = 'none';
    return;
  }

  placeholder.style.display = 'none';
  canvas.style.display = 'block';
  tableWrap.style.display = 'block';

  // Chart.js データセット構築
  const YAHOO_STORES = new Set(['ヤフオク 最安', 'ヤフオク 中央値', 'ヤフオク 最高']);
  // 日付がない場合は直前の価格を引き継ぐ（前値補完）
  const storeData = s => {
    const storeRows = rows.filter(x => x.store === s).sort((a, b) => a.date.localeCompare(b.date));
    let last = null;
    return dates.map(d => {
      const r = storeRows.find(x => x.date === d);
      if (r) last = r.price;
      return last;
    });
  };

  // 通常ストア（ヤフオク以外）
  const normalStores = [...new Set(rows.map(r => r.store))].filter(s => !YAHOO_STORES.has(s));
  const datasets = normalStores.map(store => {
    const color = STORE_COLORS[store] || { border: '#aaa', bg: 'rgba(170,170,170,0.1)', dash: [] };
    return {
      label: store,
      data: storeData(store),
      borderColor: color.border,
      backgroundColor: color.bg,
      borderWidth: 2,
      borderDash: color.dash || [],
      pointRadius: 4,
      pointHoverRadius: 6,
      fill: true,
      tension: 0.3,
      spanGaps: true,
    };
  });

  // ヤフオク: 最高(上限)→最安(下限=レンジ塗り)→平均(ライン)
  if (rows.some(r => YAHOO_STORES.has(r.store))) {
    // 上限（凡例非表示・境界線のみ）
    datasets.push({
      label: 'ヤフオク 最高',
      data: storeData('ヤフオク 最高'),
      borderColor: 'rgba(76,175,135,0.35)',
      backgroundColor: 'transparent',
      borderWidth: 1,
      borderDash: [4, 3],
      pointRadius: 3,
      pointHoverRadius: 5,
      fill: false,
      tension: 0.3,
      spanGaps: true,
    });
    // 下限（上限との間をレンジ塗り）
    datasets.push({
      label: 'ヤフオク 最安',
      data: storeData('ヤフオク 最安'),
      borderColor: 'rgba(76,175,135,0.35)',
      backgroundColor: 'rgba(76,175,135,0.1)',
      borderWidth: 1,
      borderDash: [4, 3],
      pointRadius: 3,
      pointHoverRadius: 5,
      fill: '-1',
      tension: 0.3,
      spanGaps: true,
    });
    // 平均（メインライン）
    datasets.push({
      label: 'ヤフオク 中央値',
      data: storeData('ヤフオク 中央値'),
      borderColor: '#4caf87',
      backgroundColor: 'transparent',
      borderWidth: 2.5,
      borderDash: [],
      pointRadius: 4,
      pointHoverRadius: 6,
      fill: false,
      tension: 0.3,
      spanGaps: true,
    });
  }

  // 定価の基準線（値上げがあれば途中でステップアップする）
  const msrpLineData = dates.map(date => getMsrpForDate(productName, date));
  if (msrpLineData.some(v => v !== null)) {
    datasets.push({
      label: '定価',
      data: msrpLineData,
      borderColor: 'rgba(255,255,255,0.25)',
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      borderDash: [8, 5],
      pointRadius: 0,
      pointHoverRadius: 0,
      fill: false,
      tension: 0,
      spanGaps: true,
      order: 99,
    });
  }

  if (myChart) myChart.destroy();

  myChart = new Chart(canvas, {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: {
            color: '#e4e6f0',
            font: { size: 12 },
            padding: 16,
            usePointStyle: true,
            filter: item => item.text !== 'ヤフオク 最高',
          },
        },
        tooltip: {
          backgroundColor: '#1a1d27',
          borderColor: '#2e3248',
          borderWidth: 1,
          titleColor: '#e4e6f0',
          bodyColor: '#b0b3c8',
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ¥${(ctx.parsed.y || 0).toLocaleString()}`,
          },
        },
      },
      scales: {
        x: {
          grid: { color: '#2e3248' },
          ticks: { color: '#7a7f99', maxTicksLimit: 10 },
        },
        y: {
          grid: { color: '#2e3248' },
          ticks: {
            color: '#7a7f99',
            callback: v => '¥' + v.toLocaleString(),
          },
          beginAtZero: false,
        },
      },
    },
  });

  // テーブル描画（店舗ごとに最新価格のみ）
  const tbody = document.getElementById('data-tbody');
  tbody.innerHTML = '';

  // 店舗ごとに日付降順でグループ化
  const storeRowsMap = {};
  rows.forEach(r => {
    if (!storeRowsMap[r.store]) storeRowsMap[r.store] = [];
    storeRowsMap[r.store].push(r);
  });
  Object.values(storeRowsMap).forEach(arr => arr.sort((a, b) => b.date.localeCompare(a.date)));

  // 買取一丁目を先に、ヤフオクを後に並べる
  const yahooOrder = { 'ヤフオク 最安': 0, 'ヤフオク 中央値': 1, 'ヤフオク 最高': 2 };
  const tableStores = Object.keys(storeRowsMap).sort((a, b) => {
    const aY = a.startsWith('ヤフオク'), bY = b.startsWith('ヤフオク');
    if (aY !== bY) return aY ? 1 : -1;
    if (aY && bY) return (yahooOrder[a] ?? 9) - (yahooOrder[b] ?? 9);
    return a.localeCompare(b);
  });

  tableStores.forEach(store => {
    const arr = storeRowsMap[store];
    const r    = arr[0];               // 最新
    const prev = arr[1] || null;       // 1つ前
    let diffCell = '—';
    if (prev) {
      const diff = r.price - prev.price;
      const sign = diff >= 0 ? '+' : '';
      const color = diff > 0 ? 'var(--green)' : diff < 0 ? 'var(--accent2)' : 'var(--text-muted)';
      diffCell = `<span style="color:${color}">${sign}¥${diff.toLocaleString()}</span>`;
    }
    const msrpForRow = getMsrpForDate(productName, r.date);
    const msrpCell = msrpForRow ? `¥${msrpForRow.toLocaleString()}` : '—';
    const rate = calcRate(r.price, msrpForRow);
    const rc = rateClass(rate);
    const rateCell = rate !== null
      ? `<span class="rate-badge ${rc}">${rate}%</span>`
      : '<span style="color:var(--text-muted)">—</span>';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.date}</td>
      <td>${r.store}</td>
      <td>¥${r.price.toLocaleString()}</td>
      <td>${diffCell}</td>
      <td style="color:var(--text-muted)">${msrpCell}</td>
      <td>${rateCell}</td>
    `;
    tbody.appendChild(tr);
  });
}

// ─────────────────────────────────────────────────────────────────────
// CSV 読み込み → 初期化
// ─────────────────────────────────────────────────────────────────────
function parseMsrpCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return;
  const headers = lines[0].split(',').map(h => h.trim());
  const nameIdx = headers.indexOf('product_name');
  const msrpIdx = headers.indexOf('msrp');
  const dateIdx = headers.indexOf('effective_date');
  if (nameIdx < 0 || msrpIdx < 0) return;
  lines.slice(1).forEach(line => {
    const vals = line.split(',');
    const name  = (vals[nameIdx] || '').trim();
    const price = parseInt(vals[msrpIdx], 10);
    const effDate = (dateIdx >= 0 ? vals[dateIdx] || '' : '').trim() || '2000-01-01';
    if (name && price > 0) {
      if (!msrpHistory[name]) msrpHistory[name] = [];
      msrpHistory[name].push({ effective_date: effDate, msrp: price });
    }
  });
}

async function loadData() {
  const badge = document.getElementById('status-badge');
  // ブラウザ・CDN キャッシュ回避用バージョン文字列（日付単位）
  const cv = new Date().toISOString().slice(0, 10).replace(/-/g, '');
  try {
    // prices.csv 読み込み
    const priceCandidates = ['./prices.csv', '../data/prices.csv', 'prices.csv'];
    let text = null;
    for (const path of priceCandidates) {
      try {
        const resp = await fetch(`${path}?v=${cv}`);
        if (resp.ok) { text = await resp.text(); break; }
      } catch (_) {}
    }
    if (!text) throw new Error('prices.csv が見つかりません');
    allRows = parseCSV(text);

    // msrp.csv 読み込み（失敗しても続行）
    const msrpCandidates = ['./msrp.csv', '../data/msrp.csv', 'msrp.csv'];
    for (const path of msrpCandidates) {
      try {
        const resp = await fetch(`${path}?v=${cv}`);
        if (resp.ok) { parseMsrpCSV(await resp.text()); break; }
      } catch (_) {}
    }

    // last_scrape.txt から実際のスクレイプ日を取得（価格変化なし日も正しく表示）
    const scrapeMarkerCandidates = ['./last_scrape.txt', '../data/last_scrape.txt'];
    for (const path of scrapeMarkerCandidates) {
      try {
        const resp = await fetch(`${path}?v=${cv}`);
        if (resp.ok) {
          const d = (await resp.text()).trim();
          if (d) document.getElementById('last-updated').textContent = `最終更新: ${d}`;
          break;
        }
      } catch (_) {}
    }

    if (allRows.length === 0) {
      badge.textContent = '⚠ データ空';
      badge.className = 'error';
    }

    updateSummaryCards();
    renderSubcatTabs();
    renderProductList();
  } catch (e) {
    badge.textContent = '⚠ 読込失敗';
    badge.className = 'error';
    console.error(e);
    document.getElementById('placeholder').innerHTML =
      `<div class="icon">⚠️</div><div>${e.message}</div>`;
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

// ─────────────────────────────────────────────────────────────────────
// イベントバインド
// ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCat = tab.dataset.cat;
    currentSubcat = 'all';
    renderSubcatTabs();
    renderProductList();
  });
});

// ─────────────────────────────────────────────────────────────────────
// サイドバー検索（名前・JAN部分一致 → インライン結果パネル）
// ─────────────────────────────────────────────────────────────────────
function searchAllProducts(query) {
  if (!query.trim()) return [];
  const q = query.toLowerCase();
  const allNames = Object.keys(PRODUCT_CATEGORIES);
  const matched = allNames.filter(name => {
    if (name.toLowerCase().includes(q)) return true;
    const jan = janMap[name] || '';
    return jan && jan.includes(q);
  });
  // 前方一致を優先
  matched.sort((a, b) => {
    const as = a.toLowerCase().startsWith(q) ? 0 : 1;
    const bs = b.toLowerCase().startsWith(q) ? 0 : 1;
    return as - bs || a.localeCompare(b);
  });
  return matched.slice(0, 40);
}

function renderSidebarSearch(query) {
  const resultsEl = document.getElementById('search-results');
  const listEl    = document.getElementById('product-list');

  if (!query.trim()) {
    // 検索クリア → 通常リストに戻す
    resultsEl.classList.add('hidden');
    resultsEl.innerHTML = '';
    listEl.style.display = '';
    return;
  }

  const results = searchAllProducts(query);
  listEl.style.display = 'none';
  resultsEl.classList.remove('hidden');
  resultsEl.innerHTML = '';

  if (!results.length) {
    resultsEl.innerHTML = '<div class="sri-empty">該当する商品が見つかりません</div>';
    return;
  }

  results.forEach(name => {
    const el = document.createElement('div');
    el.className = 'sri';

    const prices    = Object.values(getProductLatestPrices(name));
    const bestPrice = prices.length ? Math.max(...prices.map(r => r.price)) : null;
    const jan       = janMap[name] || '';
    const cat       = PRODUCT_CATEGORIES[name] || 'その他';
    const msrpSri   = getMsrpLatest(name);
    const rateSri   = calcRate(bestPrice, msrpSri);
    const rateHtml  = rateSri !== null
      ? `<span class="rate-badge ${rateClass(rateSri)}" style="font-size:0.6rem">${rateSri}%</span>`
      : '';

    el.innerHTML = `
      <div class="sri-left">
        <div class="sri-name" title="${name}">${name}</div>
        ${jan ? `<div class="sri-jan">${jan}</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0">
        <div style="display:flex;align-items:center;gap:4px">${rateHtml}<div class="sri-price${bestPrice ? '' : ' no-data'}">${bestPrice ? '¥' + bestPrice.toLocaleString() : '—'}</div></div>
        <div style="font-size:0.65rem;color:var(--text-muted)">${cat}</div>
      </div>`;

    el.addEventListener('click', () => {
      // カテゴリタブ切替
      document.querySelectorAll('.cat-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.cat === cat)
      );
      currentCat    = cat;
      currentSubcat = 'all';
      renderSubcatTabs();
      // 検索クリア → 通常リストに戻す
      document.getElementById('search').value = '';
      resultsEl.classList.add('hidden');
      resultsEl.innerHTML = '';
      listEl.style.display = '';
      renderProductList();
      selectProduct(name);
      // 選択アイテムへスクロール
      setTimeout(() => {
        const sel = document.querySelector('.product-item.selected');
        if (sel) sel.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 60);
    });

    resultsEl.appendChild(el);
  });
}

const sidebarSearchEl = document.getElementById('search');
sidebarSearchEl.addEventListener('input', e => renderSidebarSearch(e.target.value));
sidebarSearchEl.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    sidebarSearchEl.value = '';
    renderSidebarSearch('');
    sidebarSearchEl.blur();
  }
});

// ─────────────────────────────────────────────────────────────────────
// 起動
// ─────────────────────────────────────────────────────────────────────
loadData();
</script>
