name: Weekly Yahoo Auctions Scraper

on:
  schedule:
    - cron: '0 22 * * 0'   # JST 月曜 07:00（UTC 日曜 22:00）
  workflow_dispatch:         # 手動実行ボタン

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. チェックアウト ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python セットアップ ────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      # ── 3. 依存関係インストール ────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # ── 4. Playwright ブラウザインストール ────────────────────────
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # ── 5. スクレイパー実行 ────────────────────────────────────────
      - name: Run Yahoo scraper
        run: |
          cd scraper
          python scrape_yahoo.py
        env:
          PYTHONUNBUFFERED: "1"

      # ── 6. 取得件数チェック ─────────────────────────────────────────
      - name: Verify scraped records
        run: |
          TODAY=$(python -c "from datetime import datetime, timezone, timedelta; print(datetime.now(timezone(timedelta(hours=9))).strftime('%Y-%m-%d'))")
          COUNT=$(python -c "
          import csv
          with open('data/prices.csv', encoding='utf-8') as f:
              rows = [r for r in csv.DictReader(f) if r.get('date') == '$TODAY' and 'ヤフオク' in r.get('store','')]
          print(len(rows))
          ")
          echo "Today's Yahoo records: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "WARNING: No Yahoo records scraped for $TODAY (may be normal if no auctions)"
          fi

      # ── 7. prices.csv を docs/ にコピー ───────────────────────────
      - name: Copy CSV to docs/
        run: cp data/prices.csv docs/prices.csv

      # ── 8. コミット & プッシュ ────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.csv docs/prices.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Yahoo auction prices $(date +'%Y-%m-%d') [skip ci]"
            git push
          fi
